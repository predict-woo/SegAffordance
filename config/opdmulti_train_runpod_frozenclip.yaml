# 20260721_opdmulti_frozenclip: fine-tune from the OPDReal base checkpoint
# with ONLY the CLIP backbone frozen — neck, decoder and heads all train
# (middle ground between headsonly and ft_full). lr 1e-5, short run.
# RunPod variant of opdmulti_train.yaml: volume paths, wandb off, full data
# section. Uses annotations_bwdf/ (regenerated 2026-07-16).
#
# Fine-tunes from the RunPod-retrained OPDReal checkpoint (2026-07-21,
# replaces the lost Euler-era OPDReal_v17): backbone/neck frozen, heads only.
data:
  data_path: "/workspace/datasets/OPDMulti/MotionDataset_h5"
  is_multi: True
  train_dataset_key: "MotionNet_train"
  val_dataset_key: "MotionNet_valid"
  test_dataset_key: "MotionNet_test"
  input_size: [256, 256]
  batch_size_train: 64
  batch_size_val: 64
  num_workers_train: 8
  num_workers_val: 4
  use_depth: true

seed_everything: 42

trainer:
  num_nodes: 1
  accelerator: "gpu"
  devices: 1
  strategy: "auto"
  max_epochs: 12
  precision: 16
  callbacks:
    - class_path: pytorch_lightning.callbacks.ModelCheckpoint
      init_args:
        dirpath: "/workspace/SegAffordance/experiments/20260721_opdmulti_frozenclip/checkpoints"
        monitor: val/loss_total
        mode: min
        save_top_k: 3
        save_last: true
        auto_insert_metric_name: false
        filename: "csv"
  logger:
    class_path: pytorch_lightning.loggers.CSVLogger
    init_args:
      save_dir: "/workspace/SegAffordance/experiments/20260721_opdmulti_frozenclip/logs"
      name: "opdmulti_runpod_nofreeze"
  log_every_n_steps: 10

model:
  model_params:
    clip_pretrain: "pretrain/RN50.pt"
    word_len: 77
    depth_feat_channels: [128, 256]
    fpn_in: [512, 1024, 1024]
    fpn_out: [256, 512, 1024]
    num_layers: 3
    num_head: 8
    dim_ffn: 1024
    dropout: 0.1
    intermediate: False
    proj_dropout: 0.5
    vae_latent_dim: 32
    vae_hidden_dim: 256
    num_motion_types: 2
    use_depth: true
    use_cvae: true

  loss_params:
    bce_weight: 0.5
    dice_weight: 0.5
    mask_weight: 0.5
    point_map_weight: 0.5
    coord_weight: 0.3
    vae_weight: 0.2
    motion_type_weight: 0.5
    point_sigma: 8.0
    vae_beta: 0.01

  config:
    log_image_interval_steps: 100
    input_size: [256, 256]
    enable_wandb: False
    val_vis_samples: 4
    manual_seed: 42

  optimizer_params:
    lr: 0.00001
    weight_decay: 0.0001
    scheduler_milestones: [8, 11]
    scheduler_gamma: 0.1

  train_only_heads: false
  freeze_backbone: true
  finetune_from_path: "/workspace/SegAffordance/experiments/20260721_opdreal_base/checkpoints/best-epoch15-valloss0.4069.ckpt"
